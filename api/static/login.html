<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in · Industry Classifier</title>
  <style>
    :root {
      --bg: #0f1216;
      --panel: #171b22;
      --panel-2: #1f252e;
      --border: #2a313c;
      --text: #e6e9ef;
      --muted: #8b94a3;
      --accent: #5b8def;
      --err: #ef4444;
      --radius: 12px;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
    body { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px;
      width: 100%;
      max-width: 360px;
    }
    .card h1 { font-size: 18px; font-weight: 600; margin: 0 0 4px 0; letter-spacing: 0.2px; }
    .card .subtitle { font-size: 13px; color: var(--muted); margin: 0 0 24px 0; }

    .field { margin-bottom: 14px; }
    .field label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.6px; }
    .field input {
      width: 100%;
      padding: 10px 12px;
      font-size: 14px;
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      outline: none;
      transition: border-color 120ms;
    }
    .field input:focus { border-color: var(--accent); }

    .btn {
      display: block; width: 100%; margin-top: 8px;
      padding: 12px 16px; font-size: 14px; font-weight: 500;
      background: var(--accent); color: white; border: none;
      border-radius: 8px; cursor: pointer;
      transition: background 120ms, opacity 120ms;
    }
    .btn:hover:not(:disabled) { background: #4a7ce0; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .err {
      display: none; margin-top: 16px; padding: 10px 12px;
      background: rgba(239, 68, 68, 0.08);
      border: 1px solid rgba(239, 68, 68, 0.25);
      border-radius: 8px; color: var(--err); font-size: 13px;
    }
    .err.show { display: block; }

    .hint {
      margin-top: 20px; padding: 10px 12px;
      background: var(--panel-2); border: 1px solid var(--border);
      border-radius: 8px; color: var(--muted); font-size: 12px;
      line-height: 1.5;
    }
    .hint code { color: var(--text); background: transparent; }

    .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 700ms linear infinite; vertical-align: middle; margin-right: 6px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <form class="card" id="loginForm" autocomplete="on">
    <h1>Sign in</h1>
    <p class="subtitle">Industry Classifier</p>

    <div class="field">
      <label for="username">Username</label>
      <input id="username" name="username" type="text" required autocomplete="username" autofocus />
    </div>
    <div class="field">
      <label for="password">Password</label>
      <input id="password" name="password" type="password" required autocomplete="current-password" />
    </div>

    <button class="btn" id="submit" type="submit">Sign in</button>
    <div class="err" id="err"></div>

    <div class="hint">
      Demo accounts:<br/>
      <code>user1 / user1</code>, <code>user2 / user2</code>, <code>reviewer1 / reviewer1</code>
    </div>
  </form>

  <script>
    const form = document.getElementById('loginForm');
    const submitBtn = document.getElementById('submit');
    const errEl = document.getElementById('err');

    function showErr(msg) { errEl.textContent = msg; errEl.classList.add('show'); }
    function hideErr() { errEl.classList.remove('show'); }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideErr();
      submitBtn.disabled = true;
      submitBtn.innerHTML = '<span class="spinner"></span>Signing in…';
      try {
        const body = new FormData(form);
        const r = await fetch('/api/v1/auth/login', { method: 'POST', body });
        const data = await r.json().catch(() => ({}));
        if (!r.ok || data.status !== 'success') {
          throw new Error(data.detail || `HTTP ${r.status}`);
        }
        window.location.href = data.redirect_url || '/';
      } catch (ex) {
        showErr(`Sign in failed: ${ex.message || ex}`);
        submitBtn.disabled = false;
        submitBtn.textContent = 'Sign in';
      }
    });
  </script>
</body>
</html>
