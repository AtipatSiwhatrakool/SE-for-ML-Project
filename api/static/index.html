<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Industry Classifier</title>
  <style>
    :root {
      --bg: #0f1216;
      --panel: #171b22;
      --panel-2: #1f252e;
      --border: #2a313c;
      --text: #e6e9ef;
      --muted: #8b94a3;
      --accent: #5b8def;
      --accent-2: #7cd992;
      --warn: #f5a524;
      --err: #ef4444;
      --radius: 12px;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
    body { min-height: 100vh; display: flex; flex-direction: column; }
    header { padding: 24px 32px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    header h1 { font-size: 18px; font-weight: 600; margin: 0; letter-spacing: 0.2px; }
    header .status { font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 6px; }
    header .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); }
    header .dot.ok { background: var(--accent-2); }
    header .dot.bad { background: var(--err); }

    main { flex: 1; max-width: 960px; width: 100%; margin: 0 auto; padding: 32px; display: grid; gap: 24px; grid-template-columns: 1fr 1fr; }
    @media (max-width: 760px) { main { grid-template-columns: 1fr; padding: 20px; } }

    .card { background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; }
    .card h2 { font-size: 13px; font-weight: 500; margin: 0 0 12px 0; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; }

    .drop {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      border: 1.5px dashed var(--border);
      border-radius: var(--radius);
      padding: 40px 20px;
      text-align: center;
      cursor: pointer;
      transition: border-color 120ms, background 120ms;
      background: var(--panel-2);
    }
    .drop strong, .drop p { margin: 0; }
    .drop:hover, .drop.dragover { border-color: var(--accent); background: #1c2431; }
    .drop input { display: none; }
    .drop p { margin: 8px 0 0; color: var(--muted); font-size: 13px; }
    .drop strong { color: var(--text); font-weight: 500; font-size: 14px; }

    .preview-wrap { margin-top: 16px; display: none; }
    .preview-wrap.show { display: block; }
    .preview-wrap img { width: 100%; max-height: 320px; object-fit: contain; border-radius: 8px; background: #000; display: block; }
    .preview-meta { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; font-size: 12px; color: var(--muted); }
    .btn-clear { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 12px; padding: 4px 6px; }
    .btn-clear:hover { color: var(--text); }

    .btn {
      display: block; width: 100%; margin-top: 16px;
      padding: 12px 16px; font-size: 14px; font-weight: 500;
      background: var(--accent); color: white; border: none;
      border-radius: 8px; cursor: pointer;
      transition: background 120ms, opacity 120ms;
    }
    .btn:hover:not(:disabled) { background: #4a7ce0; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .result-empty { color: var(--muted); font-size: 13px; text-align: center; padding: 40px 0; }
    .result-card { display: none; }
    .result-card.show { display: block; }

    .pred-label {
      font-size: 24px; font-weight: 600; margin: 0 0 4px;
      text-transform: capitalize; letter-spacing: -0.2px;
    }
    .pred-sub { font-size: 12px; color: var(--muted); margin-bottom: 16px; }

    .confidence-row { margin-bottom: 14px; }
    .confidence-row .label { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 6px; color: var(--muted); }
    .confidence-row .label .val { color: var(--text); font-variant-numeric: tabular-nums; }
    .bar { height: 6px; background: var(--panel-2); border-radius: 3px; overflow: hidden; }
    .bar-fill { height: 100%; background: var(--accent-2); transition: width 300ms ease; }
    .bar-fill.low { background: var(--warn); }

    .badges { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 16px; }
    .badge { padding: 4px 10px; border-radius: 999px; font-size: 11px; font-weight: 500; letter-spacing: 0.3px; }
    .badge.ok { background: rgba(124, 217, 146, 0.12); color: var(--accent-2); border: 1px solid rgba(124, 217, 146, 0.25); }
    .badge.warn { background: rgba(245, 165, 36, 0.12); color: var(--warn); border: 1px solid rgba(245, 165, 36, 0.25); }
    .badge.muted { background: var(--panel-2); color: var(--muted); border: 1px solid var(--border); }

    .err { display: none; margin-top: 16px; padding: 12px; background: rgba(239, 68, 68, 0.08); border: 1px solid rgba(239, 68, 68, 0.25); border-radius: 8px; color: var(--err); font-size: 13px; }
    .err.show { display: block; }

    .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 700ms linear infinite; vertical-align: middle; margin-right: 6px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <header>
    <h1>Industry Classifier</h1>
    <div class="status">
      <span id="statusDot" class="dot"></span>
      <span id="statusText">checking…</span>
    </div>
  </header>

  <main>
    <section class="card">
      <h2>Upload</h2>
      <label class="drop" id="drop">
        <input type="file" id="file" accept=".jpg,.jpeg,.png,image/jpeg,image/png" />
        <strong>Click, drop, or paste an image</strong>
        <p>JPG or PNG · press ⌘V / Ctrl+V to paste</p>
      </label>

      <div class="preview-wrap" id="previewWrap">
        <img id="preview" alt="preview" />
        <div class="preview-meta">
          <span id="fileMeta"></span>
          <button class="btn-clear" id="clearBtn">Remove</button>
        </div>
      </div>

      <button class="btn" id="submit" disabled>Predict industry</button>
      <div class="err" id="err"></div>
    </section>

    <section class="card">
      <h2>Prediction</h2>
      <div class="result-empty" id="empty">Upload an image to see the prediction here.</div>
      <div class="result-card" id="result">
        <div class="pred-label" id="predLabel">—</div>
        <div class="pred-sub" id="predSub"></div>

        <div class="confidence-row">
          <div class="label"><span>Confidence</span><span class="val" id="confVal">0%</span></div>
          <div class="bar"><div class="bar-fill" id="confFill" style="width: 0%"></div></div>
        </div>

        <div class="badges">
          <span class="badge muted" id="timeBadge">— ms</span>
          <span class="badge" id="reviewBadge">—</span>
        </div>
      </div>
    </section>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);
    const fileInput = $('file');
    const drop = $('drop');
    const previewWrap = $('previewWrap');
    const preview = $('preview');
    const fileMeta = $('fileMeta');
    const clearBtn = $('clearBtn');
    const submit = $('submit');
    const err = $('err');
    const empty = $('empty');
    const result = $('result');
    const predLabel = $('predLabel');
    const predSub = $('predSub');
    const confVal = $('confVal');
    const confFill = $('confFill');
    const timeBadge = $('timeBadge');
    const reviewBadge = $('reviewBadge');
    const statusDot = $('statusDot');
    const statusText = $('statusText');

    let currentFile = null;

    async function checkHealth() {
      try {
        const r = await fetch('/health');
        if (!r.ok) throw new Error(r.status);
        const d = await r.json();
        statusDot.classList.add('ok');
        statusText.textContent = `healthy · ${d.device || 'cpu'}`;
      } catch {
        statusDot.classList.add('bad');
        statusText.textContent = 'api unreachable';
      }
    }

    function setFile(f) {
      if (!f) return;
      const name = (f.name || '').toLowerCase();
      const type = (f.type || '').toLowerCase();
      const okName = name.endsWith('.jpg') || name.endsWith('.jpeg') || name.endsWith('.png');
      const okType = type === 'image/jpeg' || type === 'image/png';
      if (!okName && !okType) {
        showErr('Unsupported file type. Use JPG or PNG.');
        return;
      }
      // Pasted images may lack a filename ending — give one the backend accepts.
      if (!okName && okType) {
        const ext = type === 'image/png' ? 'png' : 'jpg';
        f = new File([f], `pasted.${ext}`, { type: f.type });
      }
      currentFile = f;
      const reader = new FileReader();
      reader.onload = e => { preview.src = e.target.result; };
      reader.readAsDataURL(f);
      previewWrap.classList.add('show');
      fileMeta.textContent = `${f.name} · ${(f.size / 1024).toFixed(0)} KB`;
      submit.disabled = false;
      hideErr();
    }

    function clearFile() {
      currentFile = null;
      fileInput.value = '';
      previewWrap.classList.remove('show');
      submit.disabled = true;
      preview.src = '';
      hideErr();
    }

    function showErr(msg) { err.textContent = msg; err.classList.add('show'); }
    function hideErr() { err.classList.remove('show'); }

    fileInput.addEventListener('change', e => setFile(e.target.files[0]));

    ['dragenter', 'dragover'].forEach(ev => drop.addEventListener(ev, e => {
      e.preventDefault(); drop.classList.add('dragover');
    }));
    ['dragleave', 'drop'].forEach(ev => drop.addEventListener(ev, e => {
      e.preventDefault(); drop.classList.remove('dragover');
    }));
    drop.addEventListener('drop', e => {
      if (e.dataTransfer.files[0]) setFile(e.dataTransfer.files[0]);
    });

    clearBtn.addEventListener('click', e => { e.preventDefault(); clearFile(); });

    document.addEventListener('paste', e => {
      const items = e.clipboardData && e.clipboardData.items;
      if (!items) return;
      for (const item of items) {
        if (item.kind === 'file' && item.type.startsWith('image/')) {
          const f = item.getAsFile();
          if (f) { setFile(f); e.preventDefault(); break; }
        }
      }
    });

    submit.addEventListener('click', async () => {
      if (!currentFile) return;
      hideErr();
      submit.disabled = true;
      submit.innerHTML = '<span class="spinner"></span>Predicting…';
      try {
        const form = new FormData();
        form.append('file', currentFile);
        const r = await fetch('/api/v1/predict', { method: 'POST', body: form });
        const body = await r.json();
        if (!r.ok || body.status !== 'success') {
          throw new Error(body.message || `HTTP ${r.status}`);
        }
        renderResult(body.data);
      } catch (e) {
        showErr(`Prediction failed: ${e.message || e}`);
      } finally {
        submit.disabled = false;
        submit.textContent = 'Predict industry';
      }
    });

    function renderResult(d) {
      empty.style.display = 'none';
      result.classList.add('show');
      predLabel.textContent = d.predicted_industry.replace(/_/g, ' ');
      predSub.textContent = `raw label: ${d.predicted_industry}`;
      const pct = Math.round(d.confidence_score * 100);
      confVal.textContent = `${pct}%`;
      confFill.style.width = `${pct}%`;
      confFill.classList.toggle('low', d.confidence_score < 0.6);
      timeBadge.textContent = `${d.inference_time_ms.toFixed(0)} ms`;
      if (d.requires_manual_review) {
        reviewBadge.className = 'badge warn';
        reviewBadge.textContent = 'needs review';
      } else {
        reviewBadge.className = 'badge ok';
        reviewBadge.textContent = 'confident';
      }
    }

    checkHealth();
  </script>
</body>
</html>
