info:
  name: health-check
  type: http
  seq: 2

http:
  method: GET
  url: http://localhost:8000/health
  auth: inherit

headers:
  - name: accept
    value: application/json

tests:
  - name: Status 200
    assert:
      - status: 200
  - name: Healthy response
    assert:
      - body.status: healthy
